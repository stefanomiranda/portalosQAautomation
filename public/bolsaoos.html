<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal V.tal - Bolsão de OS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88em;
            color: #495057;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            transition: all 0.2s;
        }
        .back-home:hover { background: #f8f9fa; border-color: #adb5bd; }

        .env-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.5px;
            vertical-align: middle;
            margin-left: 6px;
        }
        .env-tag.TRG  { background: #fff8e1; color: #7a6000; border: 1px solid #FFD700; }
        .env-tag.TI   { background: #e8f5e9; color: #1a5c2a; border: 1px solid #28a745; }
        .env-tag.TRG2 { background: #e3f2fd; color: #0d3c6e; border: 1px solid #1976d2; }

        .orders-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .orders-count {
            font-size: 0.88em;
            color: #666;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 4px 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="container">

    <a href="index.html" class="back-home">← Voltar ao Início</a>

    <h1>📦 Bolsão de OS</h1>

    <div class="section" id="osListSection">
        <div class="orders-header">
            <h2 style="margin:0; border:none; padding:0; font-size:1.2em;">Ordens de Serviço Criadas</h2>
            <span class="orders-count" id="ordersCount">Carregando...</span>
        </div>
        <div class="message hidden"></div>
        <div id="osListContainer">
            <p class="info">Carregando Ordens de Serviço...</p>
        </div>
    </div>

</div>
<script src="js/bolsaoOs.js"></script>
</body>
</html>
