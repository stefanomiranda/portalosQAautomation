<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal V.tal - Viabilidade em Lote</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .env-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 700;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }
        .env-badge.TRG  { background: #fff8e1; color: #7a6000; border: 1.5px solid #FFD700; }
        .env-badge.TI   { background: #e8f5e9; color: #1a5c2a; border: 1.5px solid #28a745; }
        .env-badge.TRG2 { background: #e3f2fd; color: #0d3c6e; border: 1.5px solid #1976d2; }
        .env-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .TRG  .env-dot { background: #FFD700; }
        .TI   .env-dot { background: #28a745; }
        .TRG2 .env-dot { background: #1976d2; }

        .file-drop-zone {
            border: 2px dashed #adb5bd;
            border-radius: 10px;
            padding: 35px 20px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
        }
        .file-drop-zone:hover,
        .file-drop-zone.dragover { border-color: #FFD700; background: #fffbe6; }
        .file-drop-zone .drop-icon { font-size: 2.5em; margin-bottom: 10px; }
        .file-drop-zone p { margin: 5px 0; color: #666; font-size: 0.9em; }
        .file-drop-zone strong { color: #212529; }

        .file-selected-info {
            display: none;
            align-items: center;
            gap: 10px;
            background: #e8f5e9;
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #1a5c2a;
        }
        .file-selected-info.show { display: flex; }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88em;
            color: #495057;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            transition: all 0.2s;
        }
        .back-home:hover { background: #f8f9fa; border-color: #adb5bd; }

        .column-hint {
            background: #f8f9fa;
            border-left: 4px solid #FFD700;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.87em;
            color: #495057;
            margin-bottom: 20px;
        }
        .column-hint strong { color: #212529; }
    </style>
</head>
<body>
<div class="container">

    <a href="index.html" class="back-home">← Voltar ao Início</a>

    <h1>📊 Viabilidade em Lote</h1>

    <!-- Badge de ambiente -->
    <div style="text-align:center;">
        <span class="env-badge TRG" id="envBadge">
            <span class="env-dot"></span>
            <span id="envBadgeText">TRG</span>
        </span>
    </div>

    <div class="section">

        <!-- Dica de colunas -->
        <div class="column-hint">
            📌 A planilha deve conter as colunas:
            <strong>CEP</strong>, <strong>Nº FACHADA</strong>, <strong>LOGRADOURO</strong> e
            <strong>COMPLEMENTO 1</strong> (opcional).
        </div>

        <!-- Seleção de CP -->
        <label for="cpSelect">Selecione o CP:</label>
        <select id="cpSelect">
            <option value="">Carregando CPs...</option>
        </select>

        <!-- Área de upload -->
        <label>Arquivo Excel (.xlsx):</label>
        <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('spreadsheetFile').click()">
            <div class="drop-icon">📂</div>
            <p><strong>Clique para selecionar</strong> ou arraste o arquivo aqui</p>
            <p>Formatos aceitos: .xlsx</p>
        </div>
        <input type="file" id="spreadsheetFile" accept=".xlsx" style="display:none">

        <!-- Info do arquivo selecionado -->
        <div class="file-selected-info" id="fileSelectedInfo">
            <span>✅</span>
            <span id="fileNameDisplay">Nenhum arquivo selecionado</span>
        </div>

        <!-- Ações -->
        <button id="processSpreadsheetBtn" disabled onclick="processarPlanilha()">
            ⚙️ Processar Planilha
        </button>
        <button id="downloadResultBtn" class="hidden" disabled onclick="baixarResultado()">
            ⬇️ Baixar Resultado
        </button>
        <!-- Bloco da barra de progresso — adicione logo depois do processSpreadsheetBtn -->
        <div id="progressBlock" class="progress-block hidden" style="margin-top: 16px;">
            <div style="background: #e0e0e0; border-radius: 8px; overflow: hidden; height: 24px; position: relative;">
                <div id="progressBar"
                    style="background: linear-gradient(90deg, #4caf50, #8bc34a);
                            height: 100%; width: 0%; transition: width 0.3s ease;
                            color: white; text-align: center; line-height: 24px; font-size: 12px; font-weight: bold;">
                    0%
                </div>
            </div>
            <div id="progressText"
                style="margin-top: 8px; font-size: 13px; color: #555; text-align: center;">
            </div>
        </div>
        <!-- Mensagem de status -->
        <div id="statusMessage" class="message hidden"></div>
    </div>

</div>
<script src="js/viabilidadeLote.js"></script>
</body>
</html>
